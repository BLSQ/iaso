{% extends "app.html" %}
{% load i18n %}

{% block content %}
  <div class="header">
    <h1>Sense HAT</h1>
    <h2>{% trans "Historic data download" %}</h2>
  </div>

  <div class="content">
      <h2 class="content-subhead">{% trans "Export data" %}</h2>
    <p>
      <form method="POST" action="{% url 'import_export:download' %}" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <button type="submit" class="pure-button pure-button-primary">{% trans "Prepare download" %}</button>
      </form>
    </p>
  </div>
{% endblock %}
