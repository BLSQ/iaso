version: '2'
services:
  db:
    image: postgres
  couchdb:
    image: couchdb
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
      # preserve node_modules from the image
      - /code/node_modules
    links:
      - db
    command: python manage.py runserver 0.0.0.0:8000
