{% extends "app.html" %}
{% load i18n %}
{% load render_bundle from webpack_loader %}

{% block content %}
  <div class="header">
    <h2>{% trans "Data upload" %}</h2>
  </div>

  <div class="content">
    <h2 class="content-subhead">Import file</h2>
    <p>
      <form method="POST" action="{% url 'import_export:upload' %}" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <button type="submit" class="pure-button pure-button-primary">{% trans "Import" %}</button>
      </form>
    </p>
  </div>

  {% render_bundle 'import' %}
{% endblock %}
