{% extends "base.html" %}

{% block body %}
  <!-- Menu toggle -->
  <a href="#menu" id="menuLink" class="menu-link">
    <!-- Hamburger icon -->
    <span></span>
  </a>

  <div id="menu">
    <div class="pure-menu">
      <a class="pure-menu-heading" href={% url "dashboard:index" %}>Sense HAT</a>
      <ul class="pure-menu-list">
        {% if perms.participants.import_mdb %}
          <li class="pure-menu-item">
            <a class="pure-menu-link" href={% url "dashboard:upload" %}>Upload</a>
          </li>
        {% endif %}
        {% if perms.participants.export_full %}
          <li class="pure-menu-item">
            <a class="pure-menu-link" href={% url "dashboard:download" %}>Download</a>
          </li>
        {% endif %}

        <li class="pure-menu-item">
          <a href={% url 'logout' %} class="pure-menu-link">Logout</a>
        </li>
      </ul>
    </div>
  </div>

  <div id="main">
    {% block content %}
      <div class="header">
        <h1>Sense HAT</h1>
      </div>
    {% endblock %}
  </div>
{% endblock %}
