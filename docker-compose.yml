version: '2'
services:
  db:
    image: postgres:9.5
  couchdb:
    image: couchdb:1.6
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
  redis:
    image: redis:3.2

  # the django dev server container
  web:
    build:
      context: .
      args:
        git_commit: "${TRAVIS_COMMIT}"
        NODE_ENV: "${NODE_ENV}"
    image: sense-hat
    ports:
      - "8080:8080"
    volumes: &web_volumes
      - ./hat:/opt/app/hat
      - ./entrypoint.sh:/opt/app/entrypoint.sh
      # shared dir between containers
      - ./shared:/opt/shared
      # build scripts for testing prod version
      - ./build_scripts:/opt/app/build_scripts
    links: &web_links
      - db
      - couchdb
      - redis
    environment: &web_environment
      SENSE_HAT_ENVIRONMENT: 'development'
      DEBUG: 'true'
      TEST_PROD: "${TEST_PROD}"
      SECRET_KEY: secret
      COUCHDB_URL: "http://couchdb:5984"
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
      HAT_MOBILE_KEY: "${HAT_MOBILE_KEY}"
      DOCKER_HOST: "${DOCKER_HOST}"
      SAUCE_USERNAME: "${SAUCE_USERNAME}"
      SAUCE_ACCESS_KEY: "${SAUCE_ACCESS_KEY}"
      # This is needed to connect to the tunnel on Saucelabs
      TRAVIS_JOB_NUMBER: "${TRAVIS_JOB_NUMBER}"
      # This is needed to group our build on Saucelabs
      TRAVIS_BUILD_NUMBER: "${TRAVIS_BUILD_NUMBER}"
    command: start_dev

  # the webpack dev server
  webpack:
    depends_on:
      - web
    image: sense-hat
    ports:
      - "3000:3000"
    volumes_from:
      - web
    environment: *web_environment
    command: start_webpack

  # the worker container of the task runner
  rq:
    depends_on:
      - web
    image: sense-hat
    volumes_from:
      - web
    links: *web_links
    environment: *web_environment
    command: start_rq

  # the jupyter server
  jupyter:
    depends_on:
      - web
    image: sense-hat
    ports:
      - "8888:8888"
    volumes_from:
      - web
    links: *web_links
    environment: *web_environment
    command: start_jupyter
