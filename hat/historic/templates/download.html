{% extends "historic.html" %}

{% block content %}
  <div class="header">
    <h1>Sense HAT</h1>
    <h2>Historic data download</h2>
  </div>

  <div class="content">
    <h2 class="content-subhead">Download CSV</h2>
    <p>
      <form method="POST" action="{% url 'historic:download' %}" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <button type="submit" class="pure-button pure-button-primary">Download</button>
      </form>
    </p>
  </div>
{% endblock %}
