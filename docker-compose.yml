version: '2'
services:
  db:
    image: postgres:9.5
  couchdb:
    image: couchdb:1.6
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
  redis:
    image: redis:3.2

  # the django dev server container
  web:
    build:
      context: .
    image: django
    ports:
      - "8080:8080"
    volumes: &web_volumes
      - .:/opt/app
      # preserve node_modules from the image
      - /opt/app/node_modules
      # shared dir between containers
      - ./shared:/opt/shared
    links: &web_links
      - db
      - couchdb
      - redis
    environment: &web_environment
      DEBUG: 'true'
      SECRET_KEY: secret
      COUCHDB_URL: "http://couchdb:5984"
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
      HAT_MOBILE_KEY: "${HAT_MOBILE_KEY}"
    command: start_dev

  # the worker container of the task runner
  rq:
    image: django
    volumes: *web_volumes
    links: *web_links
    environment: *web_environment
    command: start_rq

  # the jupyter server
  jupyter:
    image: django
    ports:
      - "8888:8888"
    volumes: *web_volumes
    links: *web_links
    environment: *web_environment
    command: start_jupyter
