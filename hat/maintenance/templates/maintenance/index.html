{% extends "app.html" %}

{% block content %}
  <div class="header">
    <h1>Sense HAT</h1>
    <h2>Maintenance</h2>
  </div>

  <div class="content">
    <p>
      Delete the data.
      <form method="POST" action="{% url 'maintenance:delete_data' %}" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <button type="submit" class="pure-button pure-button-primary" onclick="return confirm('Are you sure?')">Delete Data</button>
      </form>
    </p>
    <br>
    <p>
      Delete the data and reimport.
      <form method="POST" action="{% url 'maintenance:reimport' %}" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <button type="submit" class="pure-button pure-button-primary" onclick="return confirm('Are you sure?')">Reimport</button>
      </form>
    </p>
  </div>
{% endblock %}
