version: '3'
services:
  hat:
    build:
      context: .
      args:
        NODE_ENV: "${NODE_ENV}"
    image: trypelim-staging
    # The site is proxied via nginx and the port by nginx should be used: https://localhost:8443
    ports:
      - "80:80"
    volumes: &hat_volumes
      - ./hat:/opt/app/hat
      - ./scripts:/opt/app/scripts
      - ./entrypoint.sh:/opt/app/entrypoint.sh
      - ./docs:/opt/app/docs
      - ./media:/opt/app/media
      - ./README.rst:/opt/app/README.rst
      # shared dir between containers
      - ./shared:/opt/shared
    links: &hat_links
      - couchdb
      - redis
    environment: &hat_environment
      SENSE_HAT_ENVIRONMENT: 'staging'
      DEBUG: 'false'
      TEST_PROD: "${TEST_PROD}"
      SECRET_KEY: secret
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      COUCHDB_URL: "http://couchdb:5984"
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
      HAT_MOBILE_KEY: "${HAT_MOBILE_KEY}"
    # Limit logging in dev to not overflow terminal
    logging: &hat_logging
      driver: "json-file"
      options:
        max-size: "5k"

    command: start

  couchdb:
    image: couchdb:1.6
    ports:
      - "5984:5984"
    volumes:
      # enable cors for mobile app in-browser development:
      - ./couchdb/config-dev.ini:/usr/local/etc/couchdb/local.ini
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
    logging: *hat_logging

  redis:
    image: redis:3.2
    logging: *hat_logging


  # the worker container of the task runner
  rq:
    depends_on:
      - hat
    image: trypelim-staging
    volumes: *hat_volumes
    links: *hat_links
    environment: *hat_environment
    logging: *hat_logging
    command: start_rq