version: '3'
services:
  hat:
    build:
      context: .
      args:
        git_commit: "${TRAVIS_COMMIT}"
        NODE_ENV: "${NODE_ENV}"
    image: sense-hat
    # The site is proxied via nginx and the port by nginx should be used: https://localhost:8443
    ports:
      - "8080:8080"
    volumes: &hat_volumes
      - ./hat:/opt/app/hat
      - ./scripts:/opt/app/scripts
      - ./entrypoint.sh:/opt/app/entrypoint.sh
      - ./docs:/opt/app/docs
      - ./README.rst:/opt/app/README.rst
      # shared dir between containers
      - ./shared:/opt/shared
      # build scripts for testing prod version
      - ./build_scripts:/opt/app/build_scripts
      # test data
      - ./testdata:/opt/app/testdata
      # jupyter notebooks
      - ./notebooks:/opt/notebooks
    links: &hat_links
      - db
      - couchdb
      - redis
    environment: &hat_environment
      SENSE_HAT_ENVIRONMENT: 'development'
      DEBUG: 'true'
      TEST_PROD: "${TEST_PROD}"
      SECRET_KEY: secret
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      COUCHDB_URL: "http://couchdb:5984"
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
      HAT_MOBILE_KEY: "${HAT_MOBILE_KEY}"
      SAUCE_USERNAME: "${SAUCE_USERNAME}"
      SAUCE_ACCESS_KEY: "${SAUCE_ACCESS_KEY}"
      # This is needed to connect to the tunnel on Saucelabs
      TRAVIS_JOB_NUMBER: "${TRAVIS_JOB_NUMBER}"
      # This is needed to group our build on Saucelabs
      TRAVIS_BUILD_NUMBER: "${TRAVIS_BUILD_NUMBER}"
      AWS_STORAGE_BUCKET_NAME: "${AWS_STORAGE_BUCKET_NAME}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
    # Limit logging in dev to not overflow terminal
    logging: &hat_logging
      driver: "json-file"
      options:
        max-size: "5k"

    command: start_dev

  db:
    image: postgres:9.5
    logging: *hat_logging
    ports:
      - "5433:5432"

  couchdb:
    image: couchdb:1.6
    ports:
      - "5984:5984"
    volumes:
      # enable cors for mobile app in-browser development:
      - ./couchdb/config-dev.ini:/usr/local/etc/couchdb/local.ini
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
    logging: *hat_logging

  redis:
    image: redis:3.2
    logging: *hat_logging

  nginx:
    depends_on:
      - hat
    image: sense-hat
    ports:
      - "8443:443"
    volumes: *hat_volumes
    environment: *hat_environment
    logging: *hat_logging
    command: start_dev_nginx

  # the webpack dev server
  webpack:
    depends_on:
      - hat
    image: sense-hat
    ports:
      - "3000:3000"
    volumes: *hat_volumes
    environment: *hat_environment
    logging: *hat_logging
    command: start_webpack

  # the worker container of the task runner
  rq:
    depends_on:
      - hat
    image: sense-hat
    volumes: *hat_volumes
    links: *hat_links
    environment: *hat_environment
    logging: *hat_logging
    command: start_dev_rq

  # the jupyter server
  jupyter:
    depends_on:
      - hat
    image: sense-hat
    ports:
      - "8888:8888"
    volumes: *hat_volumes
    links: *hat_links
    environment: *hat_environment
    logging: *hat_logging
    command: start_jupyter
