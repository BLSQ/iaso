{% extends "app.html" %}
{% load i18n %}
{% load render_bundle from webpack_loader %}

{% block header %}
  <h1 class="header__title">{% trans "GIS Tools" %}</h1>
{% endblock %}

{% block content %}

  <div class="content">
    <div id='app'></div>
  </div>

  {% render_bundle 'common' %}
  {% render_bundle 'gis_tools' %}
  <script>
  {% comment %}
    The GIS tools app requires a config object populated via django
    The app is started manually with that config:
  {% endcomment %}
    HAT.gis_tools.default(
      {{ json_data|safe }},
      document.getElementById('app'),
      '/dashboard/gis-tools/'
    )
  </script>

{% endblock %}
