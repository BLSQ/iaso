services:
    iaso:
      image: blsq/iaso:${IMAGE_TAG:-latest}
      ## If you want to run the prod docker compose locally
      ## Comment the image line and uncomment the build line
      # build:
      #   context: .
      #   dockerfile: docker/prod/Dockerfile
      ports:
        - '8081:8081'
      ## If you want to use a .env file with your own values
      ##  Uncomment the env_file line
      # env_file:
      #   - .env
      environment:
        - APP_TITLE
        - AUTHENTICATION_ENFORCED
        - AVAILABLE_LANGUAGES
        - AWS_ACCESS_KEY_ID
        - AWS_S3_ENDPOINT_URL
        - AWS_S3_REGION_NAME
        - AWS_SECRET_ACCESS_KEY
        - AWS_STORAGE_BUCKET_NAME
        - AZURE_CONNECTION_STRING
        - AZURE_CONTAINER_NAME
        - AZURE_CUSTOM_DOMAIN
        - AZURE_STORAGE_ACCOUNT_NAME
        - AZURE_STORAGE_ACCOUNT_KEY
        - BACKGROUND_TASK_SERVICE
        - BEANSTALK_SQS_REGION
        - BEANSTALK_SQS_URL
        - CACHE_BACKEND
        - CACHE_LOCATION
        - CACHE_MAX_ENTRIES
        - CELERY_BROKER_URL
        - CELERY_RESULT_BACKEND
        - CLAMAV_ACTIVE
        - CLAMAV_FQDN
        - CLAMAV_PORT
        - CSRF_COOKIE_HTTPONLY
        - CSRF_COOKIE_SECURE
        - DATASET_ID
        - DB_READONLY_PASSWORD
        - DB_READONLY_USERNAME
        - DEBUG
        - DEBUG_SQL
        - DEFAULT_FROM_EMAIL
        - DISABLE_PASSWORD_LOGINS
        - DISABLE_SSL_REDIRECT
        - DJANGO_LOGGING_LEVEL
        - DRF_SPECTACULAR_DISABLE_ERRORS_AND_WARNINGS
        - DNS_DOMAIN
        - EMAIL_BACKEND
        - EMAIL_HOST
        - EMAIL_HOST_USER
        - EMAIL_HOST_PASSWORD
        - EMAIL_PORT
        - EMAIL_USE_TLS
        - ENABLE_ANALYTICS
        - ENABLE_CORS
        - ENABLE_GZIP
        - ENABLE_SETUPER_SANDBOX
        - ENCRYPTED_TEXT_FIELD_KEY
        - ENKETO_API_TOKEN
        - ENKETO_DEV
        - ENKETO_SIGNING_SECRET
        - ENKETO_URL
        - FAVICON_PATH
        - FORUM_PATH
        - HIDE_BASIC_NAV_ITEMS
        - LEARN_MORE_URL
        - LIVE_COMPONENTS
        - LOGIN_LOGO_PATH
        - LOGO_PATH
        - MAINTENANCE_MODE
        - PLUGINS
        - PRODUCT_FRUITS_WORKSPACE_CODE
        - PYTHONUNBUFFERED
        - RDS_DB_NAME
        - RDS_HOSTNAME
        - RDS_PASSWORD
        - RDS_USERNAME
        - SECRET_KEY
        - SENTRY_ENVIRONMENT
        - SENTRY_FRONT_ENABLED
        - SENTRY_TRACES_SAMPLE_RATE
        - SENTRY_ERRORS_SAMPLE_RATE
        - SENTRY_ERRORS_HTTPERROR_SAMPLE_RATE
        - SENTRY_URL
        - SESSION_COOKIE_SECURE
        - SERVER_URL
        - SETUPER_SANDBOX_PASSSWORD
        - SHOW_NAME_WITH_LOGO
        - STATIC_URL
        - SUPERSET_ADMIN_PASSWORD
        - SUPERSET_ADMIN_USERNAME
        - SUPERSET_URL
        - TEST_PROD
        - THEME_PRIMARY_BACKGROUND_COLOR
        - THEME_PRIMARY_COLOR
        - THEME_SECONDARY_COLOR
        - USER_MANUAL_PATH
        - USE_AZURE_STORAGE
        - USE_CELERY
        - USE_S3
        - WFP_AUTH_ACCOUNT
        - WFP_AUTH_CLIENT_ID
        - WFP_EMAIL_RECIPIENTS_NEW_ACCOUNT
        - WORKER
      logging: &iaso_logging
        driver: json-file
        options:
          max-size: 5k
      volumes:
        - "static-files:/opt/app/static"
      stdin_open: true
      tty: true
    nginx:
      image: nginx:stable-alpine
      ports:
        - '80:80'
      volumes:
        - ".platform/nginx/nginx.conf:/etc/nginx/nginx.conf"
        - "static-files:/opt/app/static"
      depends_on:
        - iaso

    # If you want to run the prod docker compose locally
    # you will need a database in the same network
    # and you will need your env variables to point to this database
    # db:
    #   # https://registry.hub.docker.com/r/postgis/postgis
    #   # Pinning specific minor versions of PostgreSQL and PostGIS is not easy.
    #   # https://github.com/postgis/docker-postgis/issues/396
    #   image: postgis/postgis:16-3.5
    #   logging: *iaso_logging
    #   ports:
    #       - '5433:5432'
    #   volumes:
    #       - ../pgdata-iaso-16:/var/lib/postgresql/data
    #   environment:
    #       POSTGRES_DB: ${RDS_DB_NAME}
    #       POSTGRES_USER: postgres
    #       POSTGRES_PASSWORD: postgres

volumes:
  static-files:
