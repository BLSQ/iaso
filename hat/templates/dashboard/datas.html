{% extends 'app.html' %}

{% load render_bundle from webpack_loader %}

{% block header %}

    {% blocktrans %}

    {% endblocktrans %}

{% endblock %}

{% block content %}

  <div class="content">
    <div id="app"></div>

      '/dashboard/datas/'
    )
  </script>

{% endblock %}
