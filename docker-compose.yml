version: '2'
services:
  db:
    image: postgres:9.5
  couchdb:
    image: couchdb:1.6
  redis:
    image: redis:3.2

  # the worker container of the task runner
  rq:
    build: .
    volumes:
      - .:/code
    links:
      - db
      - couchdb
      - redis
    environment:
      - DEBUG=true
      - SECRET_KEY=secret
    command: start_rq

  # the django dev server container
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
      # preserve node_modules from the image
      - /code/node_modules
      # map python site-packages for debugging
      # - /usr/local/lib/python3.5/site-packages
    links:
      - db
      - couchdb
    environment:
      - DEBUG=true
      - SECRET_KEY=secret
    command: start_devweb
