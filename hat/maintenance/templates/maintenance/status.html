{% extends "app.html" %}
{% load i18n %}

{% block head %}
  <meta http-equiv="refresh" content="2">
{% endblock %}

{% block header %}
  <h1 class="header__title">{% trans "Maintenance" %}</h1>
{% endblock %}

{% block content %}
  <div class="content">
    <div class="widget__container">
      <div class="widget__header">
        <h2 class="widget__heading">
        <i class="fa fa-cog fa-spin"></i>
          {% trans "Task running..." %}
        </h2>
      </div>
      <div class="widget__content">
        <p>{% trans "Status:" %} {{ status }}</p>
      </div>
    </div>
  </div>
{% endblock %}
