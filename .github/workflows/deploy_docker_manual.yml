name: deploy_docker_manual

on:
  push:
    branches:
      - IA-4812-clean-and-optimize-c-is-to-build-images-for-deployment
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
      environment:
        description: playground, staging, demo or prod for worker and web or exact Env name like iaso-stg-worker. Using `upgrade` for now to test
        required: true
        default: upgrade
      slack_channel:
        description: Slack Channel for notification (iasops by default)
        required: false
        default: cloud-alerts

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Set configs
        id: config
        env:
            DEFAULT_GIT_REFERENCE: main
            DEFAULT_ENVIRONMENT: upgrade
            DEFAULT_SLACK_CHANNEL: cloud-alerts
        run: |
          echo "GIT_REFERENCE=${{ github.event.inputs.branch || github.ref_name || env.DEFAULT_GIT_REFERENCE }}" >> $GITHUB_OUTPUT
          echo "ENVIRONMENT=${{ github.event.inputs.environment || env.DEFAULT_ENVIRONMENT }}" >> $GITHUB_OUTPUT
          echo "SLACK_CHANNEL=${{ github.event.inputs.slack_channel || env.DEFAULT_SLACK_CHANNEL }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.config.outputs.GIT_REFERENCE }}
          fetch-depth: 0
      - name: Deployment of ${{ steps.config.outputs.GIT_REFERENCE }} on ${{ steps.config.outputs.ENVIRONMENT }}
        id: version
        run: |
          export GITHUB_BRANCH=${GITHUB_REF##*heads/}
          echo $GITHUB_BRANCH
          git describe --tags
          echo "VERSION_NAME=$(git describe --tags --match "v[[:digit:]]*")" >> $GITHUB_OUTPUT
      - name: Slack deployment start
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.TEST_SLACK_WEBHOOK }}
          SLACK_CHANNEL: ${{ steps.config.outputs.SLACK_CHANNEL }}
          SLACK_COLOR: ""
          SLACK_USERNAME: ${{ steps.config.outputs.ENVIRONMENT }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_TITLE: Started deployement of  ${{ steps.version.outputs.VERSION_NAME }} on ${{ steps.config.outputs.ENVIRONMENT }} ...
          SLACK_FOOTER: ${{  format('<https://github.com/{0}/commit/{1}/checks|🔗{2} logs> | <https://github.com/{0}/commit/{1}/checks|🔗 Commit {1}>', github.repository, github.sha, github.job) }}
          MSG_MINIMAL: true

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
            username: ${{ secrets.DOCKER_USERNAME }} 
            password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Swap to prod docker config
        run: |
          # Replace docker-compose with prod version
          cp docker/prod/docker-compose.prod.yml docker-compose.yml
          git add -f docker-compose.yml

          # Move Dockerfile to root
          cp docker/prod/Dockerfile .

          # Replace .platform with prod version
          rm -rf .platform
          cp -r docker/prod/.platform .platform
          git add -f .platform

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          file: ./docker/prod/Dockerfile
          push: true
          tags: blsq/iaso:latest
          # https://docs.docker.com/build/cache/backends/
          cache-from: type=registry,ref=blsq/iaso:buildcache
          cache-to: type=registry,ref=blsq/iaso:buildcache,mode=max

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: 3.14

      - name: Setup beanstalk
        run: |
          cp .elasticbeanstalk/config.upgrade.yml .elasticbeanstalk/config.yml
          pip install awsebcli==3.27.1 botocore==1.42.92 boto3==1.42.92

      - name: Deploy to beanstalk (docker)
        run: bash scripts/deploy_prod_docker.sh ${{ steps.config.outputs.ENVIRONMENT }}
        env:
          IMAGE_TAG: ${{ steps.version.outputs.VERSION_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-central-1"

      - name: Slack deployement success notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.TEST_SLACK_WEBHOOK }}
          SLACK_CHANNEL: ${{ steps.config.outputs.SLACK_CHANNEL }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_USERNAME: ${{ steps.config.outputs.ENVIRONMENT }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_TITLE: Iaso ${{ steps.version.outputs.VERSION_NAME }} successfully deployed on ${{ steps.config.outputs.ENVIRONMENT }}
          SLACK_MESSAGE: ${{  format('<https://github.com/{0}/commit/{1}/checks|🔗{2} logs> | <https://github.com/{0}/commit/{1}/checks|🔗 Commit {1}>', github.repository, github.sha, github.job) }}
          SLACK_FOOTER: "-"
          MSG_MINIMAL: true
        if: success()
      - name: Slack deployement failure notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.TEST_SLACK_WEBHOOK }}
          SLACK_CHANNEL: ${{ steps.config.outputs.SLACK_CHANNEL }}
          SLACK_USERNAME: ${{ steps.config.outputs.ENVIRONMENT }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_TITLE: Deployment failure Iaso ${{ steps.version.outputs.VERSION_NAME }} - ${{ steps.config.outputs.ENVIRONMENT }}
          SLACK_MESSAGE: ${{  format('<https://github.com/{0}/commit/{1}/checks|🔗{2} logs> | <https://github.com/{0}/commit/{1}/checks|🔗 Commit {1}>', github.repository, github.sha, github.job) }}
          SLACK_FOOTER: "-"
          MSG_MINIMAL: true
        if: failure()
